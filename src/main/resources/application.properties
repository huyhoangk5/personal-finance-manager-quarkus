# ─── Server ───
quarkus.http.port=8080

# ─── Database ───
# Use environment variables for production (Render), fallback to local for development
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/finance_db}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:root}

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
# Force snake_case naming strategy (same as Spring Boot default)
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ─── CORS (Handled manually by CorsFilter) ───
quarkus.http.cors=false

# ─── Mail (Mock by default) ───
quarkus.mailer.mock=true
