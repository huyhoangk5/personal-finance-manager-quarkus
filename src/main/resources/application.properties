# ─── Server ───
quarkus.http.port=8080

# ─── Database ───
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/finance_db}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:root}

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ─── CORS (Handled manually by CorsFilter) ───
quarkus.http.cors=false

# ─── Frontend URL (for email links) ───
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# ─── Mail (Mock by default) ───
quarkus.mailer.mock=true

# ================= JWT =================
# Issuer phải khớp với Jwt.issuer() trong JwtService
mp.jwt.verify.issuer=${JWT_ISSUER:finance-manager}
# Public key để verify token (dùng RSA hoặc HMAC)
# Với smallrye-jwt, nếu dùng Jwt.sign() thì cần private key
# Dùng secret key đơn giản cho HMAC (HS256)
smallrye.jwt.sign.key.location=${JWT_SIGN_KEY_LOCATION:privateKey.pem}
smallrye.jwt.verify.key.location=${JWT_VERIFY_KEY_LOCATION:publicKey.pem}
# Thời gian sống access token (giây) — 15 phút
smallrye.jwt.new-token.lifespan=900

# ================= REDIS =================
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=10S

# ================= CACHE =================
quarkus.cache.type=redis
quarkus.cache.redis.expire-after-write=3600S

quarkus.cache.redis.categories.expire-after-write=3600S
quarkus.cache.redis.categories.value-type=java.util.List

quarkus.cache.redis.user-profile.expire-after-write=3600S
quarkus.cache.redis.user-profile.value-type=com.finance.pfm.entity.User

quarkus.cache.redis.budgets-month.expire-after-write=1800S
quarkus.cache.redis.budgets-month.value-type=java.util.List

quarkus.cache.redis.spending-by-category.expire-after-write=600S
quarkus.cache.redis.spending-by-category.value-type=java.util.Map

quarkus.cache.redis.dashboard-balance.expire-after-write=300S
quarkus.cache.redis.dashboard-balance.value-type=java.util.Map

# ================= SWAGGER / OPENAPI =================
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Personal Finance Manager API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API quản lý tài chính cá nhân
# Cho phép nhập Bearer token trong Swagger UI
quarkus.smallrye-openapi.security-scheme=jwt
quarkus.smallrye-openapi.security-scheme-name=bearerAuth
quarkus.smallrye-openapi.jwt-security-scheme-value=bearer
quarkus.smallrye-openapi.security-scheme-description=Nhập JWT token (không cần prefix Bearer)
