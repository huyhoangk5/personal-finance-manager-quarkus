# ─── Server ───
quarkus.http.port=8080

# ─── Database ───
# Use environment variables for production (Render), fallback to local for development
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/finance_db}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:root}

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
# Force snake_case naming strategy (same as Spring Boot default)
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ─── CORS (Handled manually by CorsFilter) ───
quarkus.http.cors=false

# ─── Mail (Mock by default) ───
quarkus.mailer.mock=true

# ================= REDIS =================
# Use REDIS_URL env var (set on Render). Fallback to local Redis for development.
# Format: redis://host:port  (or rediss:// for TLS)
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}
quarkus.redis.timeout=10S

# ================= CACHE =================
quarkus.cache.type=redis
# Default TTL if not specified per cache (1 hour)
quarkus.cache.redis.expire-after-write=3600S

# Per-cache configuration (Value types are required for Redis)
quarkus.cache.redis.categories.expire-after-write=3600S
quarkus.cache.redis.categories.value-type=java.util.List

quarkus.cache.redis.user-profile.expire-after-write=3600S
quarkus.cache.redis.user-profile.value-type=com.finance.pfm.entity.User

quarkus.cache.redis.budgets-month.expire-after-write=1800S
quarkus.cache.redis.budgets-month.value-type=java.util.List

quarkus.cache.redis.spending-by-category.expire-after-write=600S
quarkus.cache.redis.spending-by-category.value-type=java.util.Map

quarkus.cache.redis.dashboard-balance.expire-after-write=300S
quarkus.cache.redis.dashboard-balance.value-type=java.util.Map
